services:
  - type: web
    name: fastapi-backend
    env: python
    buildCommand: pip install -r requirements.txt && cd ../front && npm ci && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1