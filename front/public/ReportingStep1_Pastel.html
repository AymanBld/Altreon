<!DOCTYPE html>

<body class="bg-background min-h-screen flex items-center justify-center p-gutter sm:p-container-margin antialiased">
<main class="w-full max-w-[720px] flex flex-col gap-container-margin">
<header class="flex justify-center items-center gap-unit mb-unit">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
<span class="font-h2 text-h2 text-on-background">CyberBase</span>
</header><div class="bg-surface/80 backdrop-blur-2xl border border-outline-variant/30 rounded-[32px] shadow-[0_16px_48px_rgba(27,107,79,0.08)] p-card-padding sm:p-[40px] flex flex-col gap-container-margin">
<!-- Progress Indicator -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center mb-2">
<span class="font-label-caps text-label-caps uppercase text-on-surface-variant">Step 1 of 3</span>
<span class="font-label-caps text-label-caps uppercase text-on-surface-variant">Initial Description</span>
</div>
<div class="w-full bg-surface-container-highest rounded-full h-2 overflow-hidden">
<div class="bg-primary w-1/3 h-full rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Header -->
<div class="flex flex-col gap-[16px] text-center mt-4">
<h1 class="font-h1 text-h1 text-on-surface">What's happening in your workspace?</h1>
<p class="font-body-base text-body-base text-on-surface-variant">Describe what you're noticing in your own words. Don't worry about technical terms—just tell us what's different.</p>
</div>
<!-- Main Content: Text Area -->
<div class="flex flex-col gap-unit">
<label class="sr-only" for="incident-description">Incident Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant/50 shadow-sm rounded-2xl p-card-padding font-body-base text-on-surface focus:border-primary focus:ring-4 focus:ring-primary/10 focus:outline-none transition-all resize-none placeholder:text-on-surface-variant/50" id="incident-description" name="incident-description" placeholder="e.g., I'm seeing a weird popup, or my files won't open..." rows="6"></textarea>
</div>
<!-- Bottom Action -->
<div class="flex justify-end pt-gutter mt-2 border-t border-outline-variant/30">
<button class="bg-primary text-on-primary font-body-sm font-semibold px-gutter py-[12px] rounded-full hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20 flex items-center gap-[8px]" type="button">Continue to Triage
<span class="material-symbols-outlined text-[18px]">arrow_forward</span></button>
</div>
</div>
