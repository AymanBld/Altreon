<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dynamic Context &amp; Comment Step</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "tertiary-fixed": "#fedeaa",
                "tertiary-fixed-dim": "#e1c290",
                "primary-container": "#a7f3d0",
                "inverse-on-surface": "#eef2ed",
                "inverse-surface": "#2d312f",
                "primary-fixed-dim": "#8bd6b4",
                "on-primary-fixed-variant": "#00513a",
                "on-secondary-fixed": "#111c2d",
                "outline": "#6f7973",
                "surface-container-highest": "#e0e3df",
                "background": "#f7faf6",
                "primary": "#1b6b4f",
                "on-primary": "#ffffff",
                "on-background": "#181c1a",
                "surface-container-low": "#f1f4f0",
                "secondary": "#545f73",
                "tertiary-container": "#ffdfab",
                "on-tertiary-fixed": "#271900",
                "surface-tint": "#1b6b4f",
                "on-tertiary-fixed-variant": "#58431d",
                "surface-container-lowest": "#ffffff",
                "on-error": "#ffffff",
                "secondary-container": "#d5e0f8",
                "surface-container-high": "#e6e9e5",
                "surface-dim": "#d8dbd7",
                "surface-variant": "#e0e3df",
                "on-tertiary": "#ffffff",
                "outline-variant": "#bec9c2",
                "on-surface-variant": "#3f4943",
                "secondary-fixed": "#d8e3fb",
                "error-container": "#ffdad6",
                "on-tertiary-container": "#796138",
                "primary-fixed": "#a6f2cf",
                "surface": "#f7faf6",
                "secondary-fixed-dim": "#bcc7de",
                "surface-container": "#ecefea",
                "on-secondary-fixed-variant": "#3c475a",
                "on-error-container": "#93000a",
                "on-secondary-container": "#586377",
                "on-primary-fixed": "#002115",
                "on-surface": "#181c1a",
                "tertiary": "#725b32",
                "error": "#ba1a1a",
                "inverse-primary": "#8bd6b4",
                "on-secondary": "#ffffff",
                "on-primary-container": "#247156",
                "surface-bright": "#f7faf6"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "section-gap": "48px",
                "unit": "4px",
                "gutter": "24px",
                "container-margin": "32px",
                "card-padding": "24px"
        },
        "fontFamily": {
                "h2": [
                        "Inter"
                ],
                "label-caps": [
                        "Space Grotesk"
                ],
                "technical-mono": [
                        "Space Grotesk"
                ],
                "h1": [
                        "Inter"
                ],
                "body-sm": [
                        "Inter"
                ],
                "body-base": [
                        "Inter"
                ]
        },
        "fontSize": {
                "h2": [
                        "30px",
                        {
                                "lineHeight": "1.3",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "600"
                        }
                ],
                "label-caps": [
                        "12px",
                        {
                                "lineHeight": "1",
                                "letterSpacing": "0.05em",
                                "fontWeight": "700"
                        }
                ],
                "technical-mono": [
                        "14px",
                        {
                                "lineHeight": "1.5",
                                "letterSpacing": "0.02em",
                                "fontWeight": "500"
                        }
                ],
                "h1": [
                        "40px",
                        {
                                "lineHeight": "1.2",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ],
                "body-sm": [
                        "14px",
                        {
                                "lineHeight": "1.5",
                                "letterSpacing": "0",
                                "fontWeight": "400"
                        }
                ],
                "body-base": [
                        "16px",
                        {
                                "lineHeight": "1.6",
                                "letterSpacing": "0",
                                "fontWeight": "400"
                        }
                ]
        }
},
    },
  }
</script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 sm:p-container-margin antialiased font-body-base text-on-surface">
<!-- Main Centered Container -->
<main class="w-full max-w-[720px] flex flex-col gap-8">
<!-- Header / Brand Context -->
<header class="flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-h2 text-primary">CyberBase</span>
</header>
<!-- Conversational Card UI -->
<div class="bg-white/70 backdrop-blur-xl border border-surface-container-highest shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-[24px] p-card-padding sm:p-container-margin flex flex-col gap-section-gap">
<!-- Progress Indicator -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="font-technical-mono text-on-surface-variant">Step 2 of 3</span>
<span class="font-technical-mono text-on-surface-variant">Incident Context</span>
</div>
<div class="w-full bg-surface-variant rounded-full h-2 overflow-hidden">
<div class="bg-primary w-2/3 h-full rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Question Section -->
<div class="flex flex-col gap-gutter text-center">
<div class="mx-auto w-16 h-16 bg-primary-container flex items-center justify-center rounded-full mb-2">
<span class="material-symbols-outlined text-[32px] text-on-primary-container" data-icon="password" style="font-variation-settings: 'FILL' 0;">password</span>
</div>
<h1 class="font-h1 text-on-surface">Did you enter your password on the site?</h1>
<p class="font-body-base text-on-surface-variant max-w-[500px] mx-auto">
                    Take a deep breath. It happens. We just need to know so we can secure your account properly.
                </p>
</div>
<!-- Toggles / Action Selection -->
<div class="flex flex-col sm:flex-row gap-gutter">
<!-- Option 1 -->
<button class="flex-1 flex flex-col items-center justify-center p-card-padding bg-surface-container-lowest/50 border border-outline-variant rounded-[24px] hover:border-primary hover:bg-primary-container/20 focus:outline-none focus:ring-2 focus:ring-primary transition-all duration-200 group shadow-sm" type="button">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary mb-2 transition-colors" data-icon="keyboard">keyboard</span>
<span class="font-h2 text-on-surface group-hover:text-primary">Yes, I entered it</span>
</button>
<!-- Option 2 -->
<button class="flex-1 flex flex-col items-center justify-center p-card-padding bg-surface-container-lowest/50 border border-outline-variant rounded-[24px] hover:border-primary hover:bg-primary-container/20 focus:outline-none focus:ring-2 focus:ring-primary transition-all duration-200 group shadow-sm" type="button">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary mb-2 transition-colors" data-icon="ads_click">ads_click</span>
<span class="font-h2 text-on-surface group-hover:text-primary">No, I just clicked</span>
</button>
</div>
<!-- Optional Details Area -->
<div class="flex flex-col gap-2">
<label class="font-technical-mono text-on-surface-variant" for="extra_details">
                    Optional: Add any extra details (e.g., the name of the sender).
                </label>
<textarea class="w-full bg-surface-container-lowest/50 border border-outline-variant rounded-xl p-4 font-body-base text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/50 focus:outline-none transition-all resize-none placeholder:text-on-surface-variant/50 shadow-sm" id="extra_details" name="extra_details" placeholder="I noticed the email was from someone claiming to be HR..." rows="3"></textarea>
</div>
<!-- Actions -->
<div class="flex justify-end pt-6 mt-2 border-t border-surface-container-highest">
<button class="bg-primary text-on-primary font-technical-mono px-6 py-3 rounded-full hover:bg-primary/90 transition-colors shadow-sm flex items-center gap-2" type="button">
                    Submit to IT Securely
                    <span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
</button>
</div>
</div>
</main>
</body></html>
